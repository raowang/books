name: Build Book

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@latest
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@latest
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install markdown

      - name: Detect changed Markdown files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "files=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep '\.md$' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          else
            echo "files=$(git diff --name-only HEAD~1 HEAD | grep '\.md$' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          fi

      - name: Convert Markdown to LaTeX
        run: |
          if [ -n "${{ steps.changed.outputs.files }}" ]; then
            python3 convert_to_latex.py ${{ steps.changed.outputs.files }}
          else
            echo "No markdown files changed, skipping conversion"
          fi

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: latex/book.tex
          latexmk_use_xelatex: true
          latexmk_shell_escape: true
          work_in_root_file_dir: true

      - name: Upload PDF artifact
        uses: actions/upload-artifact@latest
        with:
          name: 重塑组织逻辑
          path: latex/book.pdf