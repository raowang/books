name: Build Book

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build PDF
        run: make build

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v6
        with:
          name: 重塑组织逻辑
          path: release/重塑组织逻辑.pdf

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download PDF artifact
        uses: actions/download-artifact@v6
        with:
          name: 重塑组织逻辑
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: ./release/重塑组织逻辑.pdf
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}